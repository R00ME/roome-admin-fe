version: "3.8"
services:
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    networks:                               
      - roome-network

  roome-backend:
    image: 9noeyni9/roome-admin-be:latest
    container_name: roome-backend
    ports:
      - "9090:9090"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis                    
      - REDIS_PORT=6379                     
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mariadb://43.200.133.70:3306/roome
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:                              
      - roome-network

networks:                                  
  roome-network:
    driver: bridge